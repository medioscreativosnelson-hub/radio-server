<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Radio en Vivo</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:black; color:white;">

<h2>🎙️ RADIO EN VIVO</h2>

<button onclick="startSender()" style="font-size:20px;">TRANSMITIR</button>
<button onclick="startReceiver()" style="font-size:20px;">ESCUCHAR</button>

<p id="status">Esperando...</p>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let pc;
let isSender = false;

function log(msg){
  document.getElementById("status").innerText = msg;
}

function createConnection(){
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      {
        urls: "turn:openrelay.metered.ca:80",
        username: "openrelayproject",
        credential: "openrelayproject"
      }
    ]
  });

  pc.onicecandidate = e => {
    if(e.candidate){
      socket.emit("candidate", e.candidate);
    }
  };

  pc.ontrack = (event) => {
    const audio = document.createElement("audio");
    audio.srcObject = event.streams[0];
    audio.autoplay = true;
    audio.controls = true;
    document.body.appendChild(audio);
  };
}

async function startSender(){
  createConnection();

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });

  isSender = true;

  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("offer", offer);

  log("Transmitiendo 🔴");
}

async function startReceiver(){
  createConnection();

  socket.on("offer", async (offer) => {
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("answer", answer);

    log("Recibiendo audio 🎧");
  });
}

socket.on("answer", async (answer) => {
  await pc.setRemoteDescription(answer);
});

socket.on("candidate", async (c) => {
  try{
    await pc.addIceCandidate(c);
  }catch{}
});
</script>

</body>
</html>
