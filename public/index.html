<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Radio en Vivo</title>
</head>
<body style="background:black;color:white;text-align:center">

<h1>🔴 RADIO EN VIVO</h1>

<h2 id="estado">Modo: Ninguno</h2>

<button onclick="startTransmit()">🎙️ Transmitir</button>
<button onclick="startListen()">🎧 Escuchar</button>

<br><br>

<audio id="player" controls playsinline></audio>

<script>
let mediaRecorder;
const audio = document.getElementById("player");
const estado = document.getElementById("estado");

// TRANSMITIR
async function startTransmit() {
  estado.innerText = "Modo: Transmitiendo 🎙️";

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    fetch("/audio", {
      method: "POST",
      body: e.data
    });
  };

  mediaRecorder.start(200); // 🔥 MENOS DELAY
}

// ESCUCHAR
function startListen() {
  estado.innerText = "Modo: Escuchando 🎧";

  audio.src = "/stream";
  audio.play();
}

// Permitir autoplay en móvil
document.body.addEventListener("click", () => {
  audio.play();
});
</script>

</body>
</html>
