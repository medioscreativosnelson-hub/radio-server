<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Radio en Vivo PRO</title>
</head>
<body style="background:black;color:white;text-align:center">

<h1>⚡ RADIO SIN DELAY</h1>

<h2 id="estado">Modo: Ninguno</h2>

<button onclick="startTransmit()">🎙️ Transmitir</button>
<button onclick="startListen()">🎧 Escuchar</button>

<br><br>

<audio id="audio" autoplay controls></audio>

<script>
let pc = new RTCPeerConnection();
let audio = document.getElementById("audio");
let estado = document.getElementById("estado");

// TRANSMITIR
async function startTransmit() {
  estado.innerText = "Transmitiendo 🎙️";

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  localStorage.setItem("offer", JSON.stringify(offer));
  alert("📱 Ahora abre en el otro celular y dale ESCUCHAR");
}

// ESCUCHAR
async function startListen() {
  estado.innerText = "Escuchando 🎧";

  const offer = JSON.parse(localStorage.getItem("offer"));
  await pc.setRemoteDescription(offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  pc.ontrack = event => {
    audio.srcObject = event.streams[0];
  };
}
</script>

</body>
</html>
