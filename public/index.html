<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Radio Enlace</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h2>🎙 Radio Enlace</h2>

<input type="password" id="pass" placeholder="Clave"><br><br>

<button onclick="start()" style="font-size:20px;">
🚀 INICIAR TRANSMISIÓN
</button>

<p id="status">Esperando...</p>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let pc;
let isSender = false;
let stream;

function log(msg){
  document.getElementById("status").innerText = msg;
}

function createConnection(){
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  pc.onicecandidate = e => {
    if(e.candidate){
      socket.emit("candidate", e.candidate);
    }
  };

  pc.ontrack = (event) => {
    const audio = document.createElement("audio");
    audio.srcObject = event.streams[0];
    audio.autoplay = true;
  };
}

async function start(){
  const pass = document.getElementById("pass").value;
  socket.emit("auth", pass);
}

socket.on("auth_ok", async () => {
  log("Conectado...");

  createConnection();

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    isSender = true;

    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("offer", offer);

    log("Transmitiendo 🔴");

  }catch(e){
    log("Error micrófono");
  }
});

socket.on("offer", async (offer) => {
  if(isSender) return;

  createConnection();

  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit("answer", answer);

  log("Recibiendo audio 🎧");
});

socket.on("answer", async (answer) => {
  await pc.setRemoteDescription(answer);
});

socket.on("candidate", async (c) => {
  try{
    await pc.addIceCandidate(c);
  }catch{}
});


// 🔁 RECONEXIÓN AUTOMÁTICA
setInterval(()=>{
  if(pc && pc.connectionState === "disconnected"){
    log("Reconectando...");
    location.reload();
  }
},3000);

</script>

</body>
</html>
