<!DOCTYPE html>
<html>
<head>
  <title>Radio en Vivo</title>
</head>
<body style="background:black;color:white;text-align:center;font-family:sans-serif">

<h1>🎙️ RADIO EN VIVO</h1>

<input type="password" id="clave" placeholder="Clave">
<br><br>

<button onclick="transmitir()">TRANSMITIR</button>
<button onclick="escuchar()">ESCUCHAR</button>

<audio id="audio" controls autoplay></audio>

<script>
let socket;
let stream;

function transmitir() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(s => {
      stream = s;
      socket = new WebSocket(location.origin.replace('http','ws'));

      socket.onopen = () => {
        const mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => {
          socket.send(e.data);
        };
        mediaRecorder.start(100);
      };
    });
}

function escuchar() {
  socket = new WebSocket(location.origin.replace('http','ws'));

  socket.onmessage = e => {
    const audio = document.getElementById("audio");
    const blob = new Blob([e.data], { type: 'audio/webm' });
    audio.src = URL.createObjectURL(blob);
  };
}
</script>

</body>
</html>
